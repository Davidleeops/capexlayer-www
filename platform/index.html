<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CapExLayer Platform</title>
  <meta name="description" content="CapExLayer live signal dashboard." />
  <meta name="robots" content="noindex,nofollow" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #080e1a; }
    .cg-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
    .cg-fallback {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      color: #dde2f4;
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
      text-align: center;
      padding: 32px;
    }
    .cg-fallback a {
      color: #c9a84c;
      text-decoration: none;
      border: 1px solid rgba(201, 168, 76, 0.35);
      padding: 10px 18px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <iframe
    class="cg-frame"
    src="https://www.cranegenius.com/platform/dashboard"
    title="CapExLayer Live Dashboard"
    allow="fullscreen"
    referrerpolicy="no-referrer-when-downgrade"
    onerror="document.getElementById('fallback').style.display='flex';this.style.display='none';"
  ></iframe>
  <div id="fallback" class="cg-fallback">
    <div>Loading the live platform.</div>
    <a href="https://www.cranegenius.com/platform/dashboard">Open the dashboard directly</a>
  </div>
</body>
</html>
